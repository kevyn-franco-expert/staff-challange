# =============================================================================
# AI-Assisted PR Review
# Demonstrates integration point for Amazon Q Developer automated analysis.
# In production, the heuristic scan below is replaced by Amazon Q Developer
# API calls (via AWS SDK) after configuring credentials.
# =============================================================================
name: AI-Assisted PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-pr-review:
    name: Heuristic PR Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Production integration: Replace the script below with Amazon Q Developer
      # calls using aws-actions/configure-aws-credentials + AWS SDK.
      # Amazon Q analyzes diff, detects security anti-patterns, and suggests
      # fixes directly as PR review comments.
      # -----------------------------------------------------------------------
      - name: PR Heuristic Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const findings = [];
            let totalLines = 0;

            for (const f of files) {
              totalLines += f.additions + f.deletions;
              // Detect secrets (basic heuristic)
              if (/password|secret|token|api.key/i.test(f.patch || '')) {
                findings.push(`🔒 **Potential secret in** \`${f.filename}\` — review manually`);
              }
              // Detect large files
              if (f.additions + f.deletions > 500) {
                findings.push(`📦 **Large change** in \`${f.filename}\` (${f.additions + f.deletions} lines) — consider splitting`);
              }
            }

            const summary = `
            ## 🤖 AI-Assisted PR Review

            ${findings.length > 0
              ? findings.join('\n')
              : '✅ No obvious issues detected by heuristic scan.'}

            ---
            **PR Stats**: ${files.length} files changed, ${totalLines} lines modified.

            > **Note**: This is a PoC heuristic scan. In production, this step invokes **Amazon Q Developer**
            > for deep security analysis, performance anti-pattern detection, and best-practice recommendations.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

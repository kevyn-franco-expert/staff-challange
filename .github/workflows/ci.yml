# =============================================================================
# Golden Path Platform — CI Pipeline
# Validates both CLI and Framework on every PR
# =============================================================================
name: Platform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python CLI ─────────────────────────────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/goldenpath-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest tests/ -v --cov=goldenpath_cli --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/goldenpath-cli/coverage.xml
          flags: cli

  lint-cli:
    name: Lint CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/goldenpath-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: MyPy type check
        run: uv run mypy src/

  # ── TypeScript Framework ───────────────────────────────────────────────────
  test-framework:
    name: Test Framework
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/goldenpath-framework
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  lint-framework:
    name: Lint Framework
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/goldenpath-framework
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: ESLint
        run: pnpm lint

  # ── Integration Test ───────────────────────────────────────────────────────
  integration-smoke:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: [test-cli, test-framework]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CLI
        run: |
          cd packages/goldenpath-cli
          uv pip install -e ".[dev]"

      - name: CLI smoke test
        run: |
          cd /tmp
          goldenpath init --name smoke-test --language python --work-id FIN-999
          cd smoke-test
          goldenpath standards
          goldenpath validate work-id || true  # Will fail on main branch name

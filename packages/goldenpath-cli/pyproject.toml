[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldenpath-cli"
version = "0.1.0"
description = "Golden Path CLI — Enterprise Developer Experience Platform"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Platform Engineering", email = "platform@gila.software" }
]
keywords = ["cli", "devex", "platform", "golden-path", "dora", "git-governance"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Build Tools",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "gitpython>=3.1.0",
    "requests>=2.31.0",
    "python-dateutil>=2.8.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
    "types-pyyaml>=6.0",
    "types-requests>=2.31",
    "types-python-dateutil>=2.8",
]

[project.scripts]
goldenpath = "goldenpath_cli.cli:app"
gp = "goldenpath_cli.cli:app"

[project.urls]
Homepage = "https://github.com/gila-software/goldenpath-platform"
Documentation = "https://github.com/gila-software/goldenpath-platform/tree/main/packages/goldenpath-cli"
Repository = "https://github.com/gila-software/goldenpath-platform.git"
Issues = "https://github.com/gila-software/goldenpath-platform/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/goldenpath_cli"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["B008", "B904"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --tb=short"
